<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#00c896">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FoodBowl">
<title>Food Science Bowl</title>
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0f0d;
    --surface:  #111a16;
    --border:   #1e2e26;
    --accent:   #00c896;
    --accent2:  #00ffb3;
    --danger:   #ff4f5e;
    --text:     #e8f5f0;
    --muted:    #5a7a6e;
    --font-d:   'Syne', sans-serif;
    --font-m:   'JetBrains Mono', monospace;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-m);
    overscroll-behavior: none;
  }

  /* ── noise texture overlay ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
  }

  /* ── screens ── */
  .screen { display: none; flex-direction: column; flex: 1; }
  .screen.active { display: flex; }

  /* ══════════════════════════════
     HOME SCREEN
  ══════════════════════════════ */
  #home {
    justify-content: center;
    align-items: center;
    padding: 2rem;
    gap: 0;
  }

  .home-tag {
    font-family: var(--font-m);
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.5s 0.1s forwards;
  }

  .home-title {
    font-family: var(--font-d);
    font-size: clamp(2.8rem, 10vw, 5rem);
    font-weight: 800;
    line-height: 0.95;
    text-align: center;
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.5s 0.2s forwards;
  }

  .home-title span { color: var(--accent); }

  .home-sub {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.5s 0.3s forwards;
  }

  .category-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    width: 100%;
    max-width: 420px;
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.5s 0.4s forwards;
  }

  .cat-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem;
    cursor: pointer;
    text-align: left;
    transition: border-color 0.15s, transform 0.1s;
    color: var(--text);
  }

  .cat-btn:hover, .cat-btn.selected {
    border-color: var(--accent);
    transform: translateY(-2px);
  }

  .cat-btn.selected { background: #0d1f18; }

  .cat-icon { font-size: 1.4rem; margin-bottom: 0.4rem; }
  .cat-name { font-family: var(--font-d); font-size: 0.85rem; font-weight: 700; }
  .cat-count { font-size: 0.7rem; color: var(--muted); margin-top: 0.2rem; }

  .start-btn {
    width: 100%;
    max-width: 420px;
    padding: 1rem;
    background: var(--accent);
    border: none;
    border-radius: 12px;
    font-family: var(--font-d);
    font-size: 1rem;
    font-weight: 700;
    color: #0a0f0d;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    opacity: 0;
    animation: fadeUp 0.5s 0.5s forwards;
  }

  .start-btn:hover { background: var(--accent2); transform: translateY(-1px); }
  .start-btn:active { transform: scale(0.98); }

  /* timer select */
  .timer-select {
    width: 100%;
    max-width: 420px;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.5s 0.48s forwards;
  }

  .timer-label {
    font-size: 0.7rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.5rem;
  }

  .timer-opts {
    display: flex;
    gap: 0.5rem;
  }

  .timer-btn {
    flex: 1;
    padding: 0.55rem 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font-m);
    font-size: 0.82rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .timer-btn:hover { border-color: var(--accent); color: var(--text); }
  .timer-btn.selected { border-color: var(--accent); color: var(--accent); background: #0d1f18; }

  /* timer ring in quiz */
  .timer-display {
    position: relative;
    width: 36px;
    height: 36px;
    align-items: center;
    justify-content: center;
  }

  #timer-num {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: var(--font-m);
    font-size: 0.65rem;
    font-weight: 600;
    color: var(--accent);
  }

  .timer-display.urgent #timer-ring { stroke: var(--danger); }
  .timer-display.urgent #timer-num { color: var(--danger); }

  /* ══════════════════════════════
     QUIZ SCREEN
  ══════════════════════════════ */
  #quiz { padding: 0; }

  .quiz-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.25rem 1.5rem 0;
  }

  .quit-btn {
    background: none;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: var(--font-m);
    font-size: 0.75rem;
    padding: 0.4rem 0.75rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .quit-btn:hover { border-color: var(--danger); color: var(--danger); }

  .score-display {
    font-family: var(--font-m);
    font-size: 0.8rem;
    color: var(--muted);
  }
  .score-display b { color: var(--accent); font-size: 1rem; }

  .streak-display {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: var(--font-m);
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--accent);
    animation: none;
  }

  .streak-display.pop {
    animation: streakPop 0.35s cubic-bezier(0.36,0.07,0.19,0.97);
  }

  .streak-fire { font-size: 1rem; }

  @keyframes streakPop {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.5); }
    70%  { transform: scale(0.9); }
    100% { transform: scale(1); }
  }

  /* progress bar */
  .prog-wrap {
    padding: 1rem 1.5rem 0;
  }

  .prog-track {
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .prog-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s cubic-bezier(0.4,0,0.2,1);
  }

  .prog-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.68rem;
    color: var(--muted);
    margin-top: 0.4rem;
  }

  /* question area */
  .q-area {
    padding: 1.5rem 1.5rem 1rem;
    flex: 1;
    display: flex;
    flex-direction: column;
  }

  .q-text-wrap {
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex: 1;
  }

  .q-text {
    font-family: var(--font-d);
    font-size: clamp(1rem, 3.5vw, 1.25rem);
    font-weight: 700;
    line-height: 1.4;
    flex: 1;
  }

  .tts-btn {
    flex-shrink: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    margin-top: 2px;
  }

  .tts-btn:hover { border-color: var(--accent); color: var(--accent); }
  .tts-btn.speaking { border-color: var(--accent); color: var(--accent); background: #0d1f18; }
  .tts-btn.speaking #tts-wave { animation: ttsWave 0.6s ease-in-out infinite alternate; }

  @keyframes ttsWave {
    from { opacity: 0.3; }
    to   { opacity: 1; }
  }

  /* options */
  .options { display: flex; flex-direction: column; gap: 0.6rem; }

  .opt {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 0.85rem 1rem;
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    gap: 0.75rem;
    font-family: var(--font-m);
    font-size: 0.82rem;
    line-height: 1.5;
    color: var(--text);
    transition: border-color 0.12s, background 0.12s, transform 0.1s;
    text-align: left;
    width: 100%;
  }

  .opt:hover:not(:disabled) { border-color: var(--accent); background: #0d1f18; transform: translateX(3px); }

  .opt-letter {
    min-width: 22px;
    height: 22px;
    border-radius: 6px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7rem;
    font-weight: 600;
    flex-shrink: 0;
    transition: background 0.12s, color 0.12s;
  }

  .opt.correct { border-color: var(--accent); background: #0d1f18; }
  .opt.correct .opt-letter { background: var(--accent); color: #0a0f0d; }

  .opt.wrong { border-color: var(--danger); background: #1a0c0e; }
  .opt.wrong .opt-letter { background: var(--danger); color: #fff; }

  .opt:disabled { cursor: default; }

  /* explanation */
  .exp-box {
    margin: 1rem 1.5rem;
    background: #0d1f18;
    border-left: 3px solid var(--accent);
    border-radius: 0 8px 8px 0;
    padding: 0.9rem 1rem;
    font-size: 0.78rem;
    line-height: 1.7;
    color: #8ab9a8;
    display: none;
  }
  .exp-box.show { display: block; animation: fadeUp 0.3s forwards; }
  .exp-box strong { color: var(--accent); font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; display: block; margin-bottom: 0.4rem; }

  /* next button */
  .next-wrap {
    padding: 1rem 1.5rem 2rem;
  }

  .next-btn {
    width: 100%;
    padding: 0.9rem;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    font-family: var(--font-d);
    font-size: 0.95rem;
    font-weight: 700;
    color: #0a0f0d;
    cursor: pointer;
    display: none;
    transition: background 0.15s;
  }
  .next-btn.show { display: block; animation: fadeUp 0.25s forwards; }
  .next-btn:hover { background: var(--accent2); }

  /* ══════════════════════════════
     RESULT SCREEN
  ══════════════════════════════ */
  #result {
    justify-content: center;
    align-items: center;
    padding: 2rem 1.5rem;
    gap: 0;
  }

  .res-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.4s 0.1s forwards;
  }

  .res-score {
    font-family: var(--font-d);
    font-size: clamp(4rem, 20vw, 7rem);
    font-weight: 800;
    line-height: 1;
    color: var(--accent);
    margin-bottom: 0.25rem;
    opacity: 0;
    animation: fadeUp 0.4s 0.2s forwards;
  }

  .res-denom {
    font-family: var(--font-m);
    font-size: 0.85rem;
    color: var(--muted);
    margin-bottom: 1.5rem;
    opacity: 0;
    animation: fadeUp 0.4s 0.3s forwards;
  }

  .res-msg {
    font-family: var(--font-d);
    font-size: 1.05rem;
    font-weight: 700;
    text-align: center;
    margin-bottom: 0.5rem;
    opacity: 0;
    animation: fadeUp 0.4s 0.35s forwards;
  }

  .res-sub {
    font-size: 0.78rem;
    color: var(--muted);
    text-align: center;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 0.4s 0.4s forwards;
  }

  .res-btns {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    width: 100%;
    max-width: 380px;
    opacity: 0;
    animation: fadeUp 0.4s 0.5s forwards;
  }

  .res-btn-primary {
    padding: 0.9rem;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    font-family: var(--font-d);
    font-size: 0.95rem;
    font-weight: 700;
    color: #0a0f0d;
    cursor: pointer;
    transition: background 0.15s;
  }
  .res-btn-primary:hover { background: var(--accent2); }

  .res-btn-ghost {
    padding: 0.9rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    font-family: var(--font-m);
    font-size: 0.82rem;
    color: var(--muted);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .res-btn-ghost:hover { border-color: var(--accent); color: var(--accent); }
  .res-btn-ghost.copied { border-color: var(--accent); color: var(--accent); }

  /* tracking panel */
  .tracking-panel {
    width: 100%;
    max-width: 380px;
    margin: 0 0 1.5rem;
    opacity: 0;
    animation: fadeUp 0.4s 0.45s forwards;
  }

  .tracking-title {
    font-family: var(--font-m);
    font-size: 0.68rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.75rem;
    text-align: left;
  }

  .tracking-row {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    margin-bottom: 0.6rem;
  }

  .tracking-cat {
    font-size: 0.75rem;
    color: var(--text);
    width: 130px;
    flex-shrink: 0;
    text-align: left;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tracking-bar-wrap {
    flex: 1;
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }

  .tracking-bar-fill {
    height: 100%;
    border-radius: 3px;
    transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  .tracking-pct {
    font-family: var(--font-m);
    font-size: 0.72rem;
    width: 36px;
    text-align: right;
    flex-shrink: 0;
  }

  .tracking-weak  { color: var(--danger); }
  .tracking-mid   { color: #f0a500; }
  .tracking-strong{ color: var(--accent); }

  /* ── animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── install banner ── */
  #install-banner {
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 12px;
    padding: 0.75rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    font-size: 0.78rem;
    color: var(--text);
    z-index: 100;
    box-shadow: 0 4px 24px rgba(0,200,150,0.15);
    display: none;
    max-width: 340px;
    width: calc(100% - 2rem);
  }

  #install-banner.show { display: flex; animation: fadeUp 0.3s forwards; }

  .install-text { flex: 1; }
  .install-text b { color: var(--accent); display: block; margin-bottom: 0.1rem; }

  .install-yes {
    background: var(--accent);
    border: none;
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    font-family: var(--font-d);
    font-weight: 700;
    font-size: 0.8rem;
    color: #0a0f0d;
    cursor: pointer;
    white-space: nowrap;
  }

  .install-no {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 0.25rem;
  }

  /* ── difficulty select ── */
  .diff-select {
    width: 100%;
    max-width: 420px;
    margin-bottom: 1rem;
    opacity: 0;
    animation: fadeUp 0.5s 0.49s forwards;
  }

  /* ── review missed button ── */
  .review-btn {
    width: 100%;
    max-width: 420px;
    padding: 0.7rem;
    background: none;
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--muted);
    font-family: var(--font-m);
    font-size: 0.82rem;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
    margin-bottom: 0.75rem;
  }
  .review-btn:hover { border-color: #f0a500; color: #f0a500; }

  /* ── score history chart ── */
  .history-panel {
    width: 100%;
    max-width: 380px;
    margin: 0 0 1.5rem;
  }

  /* ── short answer input ── */
  .sa-area {
    display: flex;
    flex-direction: column;
    gap: 0.6rem;
  }

  .sa-input {
    width: 100%;
    padding: 0.85rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--font-m);
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.15s, background 0.15s;
    -webkit-appearance: none;
  }
  .sa-input::placeholder { color: var(--muted); }
  .sa-input:focus { border-color: var(--accent); }
  .sa-input.correct { border-color: var(--accent); background: #0d1f18; }
  .sa-input.wrong   { border-color: var(--danger);  background: #1a0c0e; }
  .sa-input:disabled { opacity: 1; }

  .sa-submit-btn {
    width: 100%;
    padding: 0.85rem;
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    color: var(--accent);
    font-family: var(--font-d);
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .sa-submit-btn:hover:not(:disabled) { background: var(--accent); color: #0a0f0d; }
  .sa-submit-btn:disabled { opacity: 0.35; cursor: default; }

  .sa-verdict {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 0.15rem;
  }
  .sa-verdict.ok { color: var(--accent); }
  .sa-verdict.no { color: var(--danger); }

  .sa-correct-text {
    font-family: var(--font-d);
    font-size: 0.95rem;
    font-weight: 700;
    color: var(--text);
  }
</style>
</head>
<body>

<div id="app">

  <!-- ── HOME ── -->
  <section class="screen active" id="home">
    <div class="home-tag">IFT College Bowl Practice</div>
    <h1 class="home-title">Food<br><span>Science</span><br>Bowl</h1>
    <p class="home-sub">Select a category and start drilling</p>

    <div class="category-grid" id="cat-grid">
      <button class="cat-btn selected" data-cat="all">
        <div class="cat-icon">🔬</div>
        <div class="cat-name">All Topics</div>
        <div class="cat-count" id="cnt-all">— questions</div>
      </button>
      <button class="cat-btn" data-cat="chemistry">
        <div class="cat-icon">⚗️</div>
        <div class="cat-name">Food Chemistry</div>
        <div class="cat-count" id="cnt-chemistry">— questions</div>
      </button>
      <button class="cat-btn" data-cat="microbiology">
        <div class="cat-icon">🦠</div>
        <div class="cat-name">Microbiology</div>
        <div class="cat-count" id="cnt-microbiology">— questions</div>
      </button>
      <button class="cat-btn" data-cat="processing">
        <div class="cat-icon">🏭</div>
        <div class="cat-name">Processing</div>
        <div class="cat-count" id="cnt-processing">— questions</div>
      </button>
      <button class="cat-btn" data-cat="regulations">
        <div class="cat-icon">📋</div>
        <div class="cat-name">Regulations</div>
        <div class="cat-count" id="cnt-regulations">— questions</div>
      </button>
      <button class="cat-btn" data-cat="sensory">
        <div class="cat-icon">👅</div>
        <div class="cat-name">Sensory Science</div>
        <div class="cat-count" id="cnt-sensory">— questions</div>
      </button>
      <button class="cat-btn" data-cat="nutrition">
        <div class="cat-icon">🥗</div>
        <div class="cat-name">Nutrition</div>
        <div class="cat-count" id="cnt-nutrition">— questions</div>
      </button>
    </div>

          <circle cx="18" cy="18" r="15" fill="none" stroke="#1e2e26" stroke-width="3"/>

            stroke-dasharray="94.2" stroke-dashoffset="0"
            stroke-linecap="round" transform="rotate(-90 18 18)"
            id="timer-ring"/>

      <button class="res-btn-ghost" id="copy-result-btn">Copy result</button>

<div id="install-banner">
  <div class="install-text">
    <b>Install app</b>
    Add to home screen for offline use
  </div>
  <button class="install-yes" id="install-yes">Install</button>
  <button class="install-no" id="install-no">✕</button>

<script src="questions.js"></script>

<script>

// ══════════════════════════════════════════
//  CATEGORY TRACKING (localStorage)
// ══════════════════════════════════════════
const CAT_LABELS = {
  chemistry:    '⚗️ Food Chemistry',
  microbiology: '🦠 Microbiology',
  processing:   '🏭 Processing',
  regulations:  '📋 Regulations',
  sensory:      '👅 Sensory Science',
  nutrition:    '🥗 Nutrition'
};

function loadTracking() {
  try {
    return JSON.parse(localStorage.getItem('foodbowl_tracking') || '{}');
  } catch { return {}; }
}

function saveTracking(data) {
  try { localStorage.setItem('foodbowl_tracking', JSON.stringify(data)); } catch {}
}

function recordAnswer(cat, correct) {
  const data = loadTracking();
  if (!data[cat]) data[cat] = { correct: 0, total: 0 };
  data[cat].total++;
  if (correct) data[cat].correct++;
  saveTracking(data);
}

function clearTracking() {
  localStorage.removeItem('foodbowl_tracking');
}

// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
let state = {
  category: 'all',
  difficulty: 'all',
  qType: 'mcq',
  qCount: 20,
  timerSec: 30,
  deck: [],
  idx: 0,
  score: 0,
  streak: 0,
  bestStreak: 0,
  answered: false,
  timerInterval: null,
  adaptiveDiff: 2,
  recentAnswers: [],
  reviewMode: false
};

// ══════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════
function init() {
  // populate counts
  const cats = ['all','chemistry','microbiology','processing','regulations','sensory','nutrition'];
  cats.forEach(c => {
    const count = c === 'all' ? QUESTIONS.length : QUESTIONS.filter(q => q.cat === c).length;
    const el = document.getElementById('cnt-' + c);
    if (el) el.textContent = count + ' questions';
  });

  // category buttons
  document.getElementById('cat-grid').addEventListener('click', e => {
    const btn = e.target.closest('.cat-btn');
    if (!btn) return;
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    state.category = btn.dataset.cat;
    saveSettings();
  });

  document.getElementById('start-btn').addEventListener('click', startQuiz);
  document.getElementById('quit-btn').addEventListener('click', quitToResult);
  document.getElementById('next-btn').addEventListener('click', nextQuestion);
  document.getElementById('retry-btn').addEventListener('click', () => startQuiz());
  document.getElementById('home-btn').addEventListener('click', goHome);
  document.getElementById('clear-tracking-btn').addEventListener('click', () => {
    clearTracking();
    document.getElementById('tracking-panel').style.display = 'none';
  });

  // timer select (scoped to avoid conflict with diff buttons)
  document.querySelectorAll('#timer-select .timer-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#timer-select .timer-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.timerSec = parseInt(btn.dataset.sec);
      saveSettings();
    });
  });

  // type select (MCQ / SA / Mixed)
  document.querySelectorAll('#type-select .timer-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#type-select .timer-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.qType = btn.dataset.qtype;
      saveSettings();
    });
  });

  // SA submit
  document.getElementById('sa-submit-btn').addEventListener('click', handleSASubmit);
  document.getElementById('sa-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSASubmit();
  });

  // count select
  document.querySelectorAll('#count-select .timer-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#count-select .timer-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.qCount = parseInt(btn.dataset.count);
      saveSettings();
    });
  });

  // difficulty select
  document.querySelectorAll('#diff-select .timer-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('#diff-select .timer-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      state.difficulty = btn.dataset.diff;
      saveSettings();
    });
  });

  // review mode button
  document.getElementById('review-btn').addEventListener('click', startReviewMode);

  // copy result button
  document.getElementById('copy-result-btn').addEventListener('click', () => {
    const btn = document.getElementById('copy-result-btn');
    navigator.clipboard.writeText(state._copyText || '').then(() => {
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy result'; btn.classList.remove('copied'); }, 1800);
    }).catch(() => {});
  });

  // keyboard shortcuts (quiz screen only)
  document.addEventListener('keydown', e => {
    if (!document.getElementById('quiz').classList.contains('active')) return;
    const focused = document.activeElement;
    const inInput = focused && (focused.tagName === 'INPUT' || focused.tagName === 'TEXTAREA');
    const key = e.key.toUpperCase();

    // A/B/C/D → click MCQ option (not when typing in SA input)
    if (['A','B','C','D'].includes(key) && !inInput && !state.answered) {
      const opts = document.querySelectorAll('.opt');
      const idx = ['A','B','C','D'].indexOf(key);
      if (opts[idx] && !opts[idx].disabled) { e.preventDefault(); opts[idx].click(); }
      return;
    }

    // Space → next question / results (not when typing in SA input)
    if (e.key === ' ' && !inInput) {
      const nextBtn = document.getElementById('next-btn');
      if (nextBtn.classList.contains('show')) { e.preventDefault(); nextBtn.click(); }
      return;
    }
  });

  applySavedSettings();
  updateReviewBtn();
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function goHome() { stopTimer(); stopSpeech(); show('home'); updateReviewBtn(); }

function quitToResult() {
  stopTimer();
  stopSpeech();
  const answeredCount = state.answered ? state.idx + 1 : state.idx;
  if (answeredCount === 0) { goHome(); return; }
  state.deck = state.deck.slice(0, answeredCount);
  state.idx = answeredCount - 1;
  showResult();
}

// ══════════════════════════════════════════
//  QUIZ LOGIC
// ══════════════════════════════════════════
function normalizeAnswer(str) {
  return str.trim().toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, ' ');
}
function checkSAAnswer(input, answers) {
  const n = normalizeAnswer(input);
  return answers.some(a => normalizeAnswer(a) === n);
}

function applyResult(correct) {
  const q = state.deck[state.idx];
  if (correct) {
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    recordAnswer(q.cat, true);
    removeWrong(q);
  } else {
    state.streak = 0;
    recordAnswer(q.cat, false);
    addWrong(q);
  }
  state.recentAnswers.push(correct);
  evaluateAdaptive();

  const streakEl = document.getElementById('streak-display');
  if (state.streak >= 2) {
    streakEl.style.display = 'flex';
    document.getElementById('streak-num').textContent = state.streak;
    streakEl.classList.remove('pop');
    void streakEl.offsetWidth;
    streakEl.classList.add('pop');
  } else {
    streakEl.style.display = 'none';
  }

  document.getElementById('live-score').textContent = state.score;
  document.getElementById('exp-box').classList.add('show');
  const nextBtn = document.getElementById('next-btn');
  nextBtn.textContent = state.idx < state.deck.length - 1 ? 'Next question →' : 'See results →';
  nextBtn.classList.add('show');
}

function handleSASubmit() {
  if (state.answered) return;
  const input = document.getElementById('sa-input');
  const answer = input.value.trim();
  if (!answer) return;

  state.answered = true;
  stopTimer();
  stopSpeech();

  const q = state.deck[state.idx];
  const correct = checkSAAnswer(answer, q.answers);

  input.classList.add(correct ? 'correct' : 'wrong');
  input.disabled = true;
  document.getElementById('sa-submit-btn').disabled = true;

  const resultEl = document.getElementById('sa-result');
  resultEl.style.display = 'block';
  const verdictEl = document.getElementById('sa-verdict');
  const correctTextEl = document.getElementById('sa-correct-text');
  if (correct) {
    verdictEl.className = 'sa-verdict ok';
    verdictEl.textContent = '✓ Correct!';
    correctTextEl.textContent = '';
  } else {
    verdictEl.className = 'sa-verdict no';
    verdictEl.textContent = '✗ Answer:';
    correctTextEl.textContent = q.answers[0];
  }

  document.getElementById('exp-text').textContent = q.exp;
  applyResult(correct);
}

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ══════════════════════════════════════════
//  TIMER
// ══════════════════════════════════════════
function startTimer() {
  clearInterval(state.timerInterval);
  if (!state.timerSec) {
    document.getElementById('timer-display').style.display = 'none';
    return;
  }
  const display = document.getElementById('timer-display');
  const numEl   = document.getElementById('timer-num');
  const ring    = document.getElementById('timer-ring');
  const total   = state.timerSec;
  const circum  = 94.2;
  display.style.display = 'flex';
  display.classList.remove('urgent');

  let remaining = total;
  const tick = () => {
    numEl.textContent = remaining;
    const offset = circum * (1 - remaining / total);
    ring.style.strokeDashoffset = offset;
    if (remaining <= 5) display.classList.add('urgent');
    if (remaining <= 0) {
      clearInterval(state.timerInterval);
      timeUp();
    }
    remaining--;
  };
  tick();
  state.timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  clearInterval(state.timerInterval);
}

function timeUp() {
  if (state.answered) return;
  state.answered = true;
  const q = state.deck[state.idx];

  if (q.type === 'sa') {
    const input = document.getElementById('sa-input');
    input.disabled = true;
    input.classList.add('wrong');
    document.getElementById('sa-submit-btn').disabled = true;
    const resultEl = document.getElementById('sa-result');
    resultEl.style.display = 'block';
    document.getElementById('sa-verdict').className = 'sa-verdict no';
    document.getElementById('sa-verdict').textContent = "⏱ Time's up! Answer:";
    document.getElementById('sa-correct-text').textContent = q.answers[0];
    document.getElementById('exp-text').textContent = q.exp;
  } else {
    document.querySelectorAll('.opt').forEach(btn => {
      btn.disabled = true;
      if (parseInt(btn.dataset.orig) === q.ans) btn.classList.add('correct');
    });
    document.getElementById('exp-text').textContent = "⏱ Time's up! — " + q.exp;
  }
  applyResult(false);
}

// ══════════════════════════════════════════
//  TEXT-TO-SPEECH
// ══════════════════════════════════════════
const tts = window.speechSynthesis;
let ttsUtterance = null;

function speakQuestion(text) {
  if (!tts) return;
  tts.cancel();
  ttsUtterance = new SpeechSynthesisUtterance(text);
  ttsUtterance.lang = 'en-US';
  ttsUtterance.rate = 0.92;
  ttsUtterance.pitch = 1;

  const btn = document.getElementById('tts-btn');
  btn.classList.add('speaking');

  ttsUtterance.onend = () => btn.classList.remove('speaking');
  ttsUtterance.onerror = () => btn.classList.remove('speaking');

  tts.speak(ttsUtterance);
}

function stopSpeech() {
  if (tts) tts.cancel();
  const btn = document.getElementById('tts-btn');
  if (btn) btn.classList.remove('speaking');
}

function startQuiz() {
  let pool = state.category === 'all'
    ? [...QUESTIONS]
    : QUESTIONS.filter(q => q.cat === state.category);

  if (state.qType !== 'both') {
    pool = pool.filter(q => q.type === state.qType);
  }

  if (state.difficulty === 'adaptive') {
    const d2 = shuffle(pool.filter(q => q.diff === 2));
    const d1 = shuffle(pool.filter(q => q.diff === 1));
    const d3 = shuffle(pool.filter(q => q.diff === 3));
    state.deck = [...d2, ...d1, ...d3];
    state.adaptiveDiff = 2;
    state.recentAnswers = [];
  } else if (state.difficulty !== 'all') {
    const filtered = pool.filter(q => q.diff === parseInt(state.difficulty));
    state.deck = shuffle(filtered.length ? filtered : pool);
  } else {
    state.deck = shuffle(pool);
  }

  if (state.qCount > 0 && state.deck.length > state.qCount) {
    state.deck = state.deck.slice(0, state.qCount);
  }

  state.idx = 0;
  state.score = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.answered = false;
  state.reviewMode = false;
  show('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state.deck[state.idx];
  const total = state.deck.length;

  // progress
  document.getElementById('prog-fill').style.width = (state.idx / total * 100) + '%';
  document.getElementById('q-counter').textContent = `Q ${state.idx + 1} of ${total}`;
  document.getElementById('cat-label').textContent =
    state.reviewMode ? `📝 ${q.cat}` :
    state.difficulty === 'adaptive' ? `🎯 ${'⭐'.repeat(state.adaptiveDiff)}` :
    q.cat;
  document.getElementById('live-score').textContent = state.score;

  // question
  document.getElementById('q-cat-tag').textContent = q.cat.toUpperCase();
  document.getElementById('q-text').textContent = q.q;

  // MCQ or SA display
  const optWrap = document.getElementById('options');
  const saArea  = document.getElementById('sa-area');

  if (q.type === 'sa') {
    optWrap.style.display = 'none';
    saArea.style.display = 'flex';
    const saInput = document.getElementById('sa-input');
    saInput.value = '';
    saInput.className = 'sa-input';
    saInput.disabled = false;
    document.getElementById('sa-submit-btn').disabled = false;
    document.getElementById('sa-result').style.display = 'none';
    setTimeout(() => saInput.focus(), 80);
  } else {
    optWrap.style.display = 'flex';
    saArea.style.display = 'none';
    const letters = ['A','B','C','D'];
    optWrap.innerHTML = '';
    const shuffledOpts = shuffle(q.opts.map((text, i) => ({ text, orig: i })));
    shuffledOpts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'opt';
      btn.dataset.orig = opt.orig;
      btn.innerHTML = `<span class="opt-letter">${letters[i]}</span><span>${opt.text}</span>`;
      btn.addEventListener('click', () => handleAnswer(btn, opt.orig, q.ans, shuffledOpts, q.exp));
      optWrap.appendChild(btn);
    });
  }

  // reset feedback
  document.getElementById('exp-box').classList.remove('show');
  document.getElementById('next-btn').classList.remove('show');
  state.answered = false;
  startTimer();

  // TTS button
  const ttsBtn = document.getElementById('tts-btn');
  ttsBtn.onclick = () => {
    if (tts.speaking) { stopSpeech(); return; }
    speakQuestion(q.q);
  };
}

function handleAnswer(clickedBtn, chosenOrig, correctOrig, shuffledOpts, exp) {
  if (state.answered) return;
  state.answered = true;
  stopTimer();
  stopSpeech();

  const allBtns = document.querySelectorAll('.opt');

  allBtns.forEach((btn, i) => {
    btn.disabled = true;
    if (shuffledOpts[i].orig === correctOrig) btn.classList.add('correct');
  });

  const correct = chosenOrig === correctOrig;
  if (!correct) clickedBtn.classList.add('wrong');
  document.getElementById('exp-text').textContent = exp;
  applyResult(correct);
}

function nextQuestion() {
  state.idx++;
  if (state.idx >= state.deck.length) {
    showResult();
  } else {
    renderQuestion();
  }
}

function showResult() {
  const total = state.deck.length;
  const pct = Math.round(state.score / total * 100);

  document.getElementById('res-score').textContent = state.score;
  document.getElementById('res-denom').textContent = `out of ${total} correct · ${pct}% · best streak ${state.bestStreak}🔥`;

  // build clipboard copy string
  const catLabel = state.category === 'all' ? 'All Categories' : CAT_LABELS[state.category] || state.category;
  state._copyText = `${catLabel} · ${state.score}/${total} (${pct}%)` +
    (state.bestStreak >= 2 ? ` 🔥${state.bestStreak} streak` : '') +
    ` — Food Science Bowl`;

  let msg, sub;
  if (pct === 100) {
    msg = "Perfect score. Bowl-ready.";
    sub = "You nailed every question. Consider tackling a harder category.";
  } else if (pct >= 80) {
    msg = "Strong performance.";
    sub = "Review the explanations on the ones you missed and drill again.";
  } else if (pct >= 60) {
    msg = "Solid foundation.";
    sub = "Focus on the topics where you hesitated. Repeat the category.";
  } else {
    msg = "Keep drilling.";
    sub = "Read through all the explanations — they're your study notes.";
  }

  document.getElementById('res-msg').textContent = msg;
  document.getElementById('res-sub').textContent = sub;

  // ── render tracking panel ──
  const tracking = loadTracking();
  const panel = document.getElementById('tracking-panel');
  const cats = Object.keys(CAT_LABELS);
  const hasData = cats.some(c => tracking[c] && tracking[c].total > 0);

  if (hasData) {
    let html = '<div class="tracking-title">Cumulative accuracy by category</div>';
    cats.forEach(c => {
      const d = tracking[c];
      if (!d || d.total === 0) return;
      const pct = Math.round(d.correct / d.total * 100);
      const cls = pct >= 75 ? 'tracking-strong' : pct >= 50 ? 'tracking-mid' : 'tracking-weak';
      const color = pct >= 75 ? 'var(--accent)' : pct >= 50 ? '#f0a500' : 'var(--danger)';
      html += `
        <div class="tracking-row">
          <div class="tracking-cat">${CAT_LABELS[c]}</div>
          <div class="tracking-bar-wrap">
            <div class="tracking-bar-fill" style="width:${pct}%; background:${color}"></div>
          </div>
          <div class="tracking-pct ${cls}">${pct}%</div>
        </div>`;
    });
    html += `<div style="font-size:0.68rem;color:var(--muted);margin-top:0.5rem;text-align:left">`;
    html += cats.filter(c => tracking[c] && tracking[c].total > 0)
               .map(c => `${CAT_LABELS[c].split(' ').slice(1).join(' ')}: ${tracking[c].correct}/${tracking[c].total}`)
               .join(' · ');
    html += '</div>';
    panel.innerHTML = html;
    panel.style.display = 'block';
  } else {
    panel.style.display = 'none';
  }

  recordRound(state.score, state.deck.length, state.category, state.difficulty);
  renderHistoryChart();
  updateReviewBtn();

  // re-animate result screen
  const screen = document.getElementById('result');
  screen.querySelectorAll('[style*="animation"]').forEach(el => {
    el.style.animation = 'none';
    void el.offsetWidth;
    el.style.animation = '';
  });

  const copyBtn = document.getElementById('copy-result-btn');
  copyBtn.textContent = 'Copy result';
  copyBtn.classList.remove('copied');

  show('result');
}

// ══════════════════════════════════════════
//  SCORE HISTORY (localStorage)
// ══════════════════════════════════════════
function loadHistory() {
  try { return JSON.parse(localStorage.getItem('foodbowl_history') || '[]'); } catch { return []; }
}
function saveHistory(data) {
  try { localStorage.setItem('foodbowl_history', JSON.stringify(data.slice(-20))); } catch {}
}
function recordRound(score, total, cat, diff) {
  const history = loadHistory();
  history.push({ ts: Date.now(), score, total, cat, diff, pct: Math.round(score / total * 100) });
  saveHistory(history);
}

// ══════════════════════════════════════════
//  WRONG ANSWER TRACKING (localStorage)
// ══════════════════════════════════════════
function loadWrong() {
  try { return JSON.parse(localStorage.getItem('foodbowl_wrong') || '[]'); } catch { return []; }
}
function saveWrong(data) {
  try { localStorage.setItem('foodbowl_wrong', JSON.stringify(data)); } catch {}
}
function addWrong(q) {
  const wrong = loadWrong();
  if (!wrong.includes(q.q)) { wrong.push(q.q); saveWrong(wrong); }
}
function removeWrong(q) {
  saveWrong(loadWrong().filter(text => text !== q.q));
}
function clearWrong() {
  localStorage.removeItem('foodbowl_wrong');
}

function updateReviewBtn() {
  const wrong = loadWrong();
  const btn = document.getElementById('review-btn');
  if (!btn) return;
  if (wrong.length > 0) {
    btn.textContent = `Review Missed (${wrong.length}) →`;
    btn.style.display = 'block';
  } else {
    btn.style.display = 'none';
  }
}

function startReviewMode() {
  const wrongTexts = loadWrong();
  if (!wrongTexts.length) { updateReviewBtn(); return; }
  const pool = QUESTIONS.filter(q => wrongTexts.includes(q.q));
  state.deck = shuffle(pool);
  state.idx = 0;
  state.score = 0;
  state.streak = 0;
  state.bestStreak = 0;
  state.answered = false;
  state.reviewMode = true;
  state.recentAnswers = [];
  show('quiz');
  renderQuestion();
}

// ══════════════════════════════════════════
//  SETTINGS PERSISTENCE (localStorage)
// ══════════════════════════════════════════
const SETTINGS_KEY = 'foodbowl_settings';

function saveSettings() {
  try {
    localStorage.setItem(SETTINGS_KEY, JSON.stringify({
      category: state.category,
      timerSec: state.timerSec,
      qType:    state.qType,
      qCount:   state.qCount,
      difficulty: state.difficulty
    }));
  } catch {}
}

function applySavedSettings() {
  let saved;
  try { saved = JSON.parse(localStorage.getItem(SETTINGS_KEY) || 'null'); } catch {}
  if (!saved) return;

  if (saved.category) {
    state.category = saved.category;
    document.querySelectorAll('.cat-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.cat === saved.category);
    });
  }
  if (saved.timerSec !== undefined) {
    state.timerSec = saved.timerSec;
    document.querySelectorAll('#timer-select .timer-btn').forEach(b => {
      b.classList.toggle('selected', parseInt(b.dataset.sec) === saved.timerSec);
    });
  }
  if (saved.qType) {
    state.qType = saved.qType;
    document.querySelectorAll('#type-select .timer-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.qtype === saved.qType);
    });
  }
  if (saved.qCount !== undefined) {
    state.qCount = saved.qCount;
    document.querySelectorAll('#count-select .timer-btn').forEach(b => {
      b.classList.toggle('selected', parseInt(b.dataset.count) === saved.qCount);
    });
  }
  if (saved.difficulty) {
    state.difficulty = saved.difficulty;
    document.querySelectorAll('#diff-select .timer-btn').forEach(b => {
      b.classList.toggle('selected', b.dataset.diff === saved.difficulty);
    });
  }
}

// ══════════════════════════════════════════
//  ADAPTIVE DIFFICULTY
// ══════════════════════════════════════════
function evaluateAdaptive() {
  if (state.difficulty !== 'adaptive') return;
  if ((state.idx + 1) % 5 !== 0) return;
  const last5 = state.recentAnswers.slice(-5);
  const pct = last5.filter(Boolean).length / last5.length;
  let newDiff = state.adaptiveDiff;
  if (pct >= 0.8 && newDiff < 3) newDiff++;
  else if (pct < 0.5 && newDiff > 1) newDiff--;
  if (newDiff !== state.adaptiveDiff) {
    state.adaptiveDiff = newDiff;
    const remaining = state.deck.slice(state.idx + 1);
    const preferred = shuffle(remaining.filter(q => q.diff === newDiff));
    const rest = shuffle(remaining.filter(q => q.diff !== newDiff));
    state.deck = [...state.deck.slice(0, state.idx + 1), ...preferred, ...rest];
    document.getElementById('cat-label').textContent = `🎯 ${'⭐'.repeat(newDiff)}`;
  }
}

// ══════════════════════════════════════════
//  SCORE HISTORY CHART
// ══════════════════════════════════════════
function renderHistoryChart() {
  const history = loadHistory();
  const panel = document.getElementById('history-panel');
  if (history.length < 2) { panel.style.display = 'none'; return; }

  const recent = history.slice(-10);
  const W = 340, H = 90;
  const pad = { t: 14, r: 8, b: 20, l: 26 };
  const cW = W - pad.l - pad.r;
  const cH = H - pad.t - pad.b;

  const pts = recent.map((r, i) => ({
    x: pad.l + (recent.length === 1 ? cW / 2 : i * cW / (recent.length - 1)),
    y: pad.t + cH * (1 - r.pct / 100),
    pct: r.pct
  }));

  const polyline = pts.map(p => `${p.x.toFixed(1)},${p.y.toFixed(1)}`).join(' ');

  const grids = [25, 50, 75, 100].map(v => {
    const y = (pad.t + cH * (1 - v / 100)).toFixed(1);
    return `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" stroke="#1e2e26" stroke-width="1"/>` +
           `<text x="${pad.l - 3}" y="${(+y + 3).toFixed(1)}" fill="#5a7a6e" font-size="7" text-anchor="end">${v}</text>`;
  }).join('');

  const dots = pts.map((p, i) => {
    const isLast = i === pts.length - 1;
    const color = p.pct >= 80 ? '#00c896' : p.pct >= 60 ? '#f0a500' : '#ff4f5e';
    const r = isLast ? 4 : 2.5;
    const label = isLast
      ? `<text x="${p.x.toFixed(1)}" y="${(p.y - 7).toFixed(1)}" fill="${color}" font-size="9" text-anchor="middle" font-family="monospace">${p.pct}%</text>`
      : '';
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}" fill="${color}" ${isLast ? 'stroke="#0a0f0d" stroke-width="1.5"' : ''}/>` + label;
  }).join('');

  panel.innerHTML =
    `<div class="tracking-title">Score history (last ${recent.length} rounds)</div>` +
    `<svg viewBox="0 0 ${W} ${H}" width="100%" style="overflow:visible;display:block">` +
    grids +
    `<polyline points="${polyline}" fill="none" stroke="#00c896" stroke-width="1.5" stroke-opacity="0.5" stroke-linejoin="round"/>` +
    dots +
    `</svg>`;
  panel.style.display = 'block';
}

// ══════════════════════════════════════════
//  PWA: SERVICE WORKER + INSTALL PROMPT
// ══════════════════════════════════════════
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-banner').classList.add('show');
});

document.getElementById('install-yes').addEventListener('click', async () => {
  document.getElementById('install-banner').classList.remove('show');
  if (deferredPrompt) {
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
  }
});

document.getElementById('install-no').addEventListener('click', () => {
  document.getElementById('install-banner').classList.remove('show');
});

// ══════════════════════════════════════════
//  START
// ══════════════════════════════════════════
init();
</script>
